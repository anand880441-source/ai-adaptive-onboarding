<!DOCTYPE html>
<html>
<head>
    <title>Upload Test</title>
</head>
<body>
    <h2>Test Upload Endpoint</h2>
    <form id="uploadForm">
        <div>
            <label>Resume (PDF/DOCX/TXT):</label>
            <input type="file" id="resume" accept=".pdf,.docx,.txt" required>
        </div>
        <br>
        <div>
            <label>Job Description (PDF/DOCX/TXT):</label>
            <input type="file" id="jd" accept=".pdf,.docx,.txt" required>
        </div>
        <br>
        <button type="submit">Upload & Test</button>
    </form>

    <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc; display: none;">
        <h3>Response:</h3>
        <pre id="response"></pre>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('resume', document.getElementById('resume').files[0]);
            formData.append('jd', document.getElementById('jd').files[0]);

            try {
                const response = await fetch('http://localhost:5000/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                document.getElementById('result').style.display = 'block';
                document.getElementById('response').textContent = JSON.stringify(data, null, 2);
                
                console.log('Success:', data);
            } catch (error) {
                document.getElementById('result').style.display = 'block';
                document.getElementById('response').textContent = 'Error: ' + error.message;
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
